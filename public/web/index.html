<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gift Wheel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg d-flex align-items-center"
      style="padding: 1rem"
    >
      <div class="container-fluid">
        <div
          class="gap-2 d-flex align-items-center"
          style="margin-top: -0.2rem"
        >
          <img
            src="./images/cogecoin-logo.png"
            style="width: 40px; height: 40px"
            alt=""
          />
          <a class="navbar-brand" href="#">Coge Gifts</a>
        </div>
        <div
          id="user-nav"
          class="d-none w-100 d-flex justify-content-between align-items-center"
        >
          <span class="navbar-text" style="width: 30%">
            <span id="user-firstname"></span>
          </span>
          <div
            style="
              display: flex;
              justify-content: flex-end;
              align-items: center;
            "
          >
            <span class="navbar-text" style="margin-right: 1rem">
              Total Points: <span id="total-points">0</span>
            </span>

            <button
              id="logout-button"
              type="button"
              class="btn btn-warning btn-sm"
            >
              <img
                src="./images/logout.svg"
                width="20"
                height="20"
                alt="logout icon"
              />
              Logout
            </button>
          </div>
        </div>
        <div id="login-nav">
          <button
            class="btn btn-warning tg-login d-flex justify-content-center align-items-center"
            type="button"
          >
            <img
              src="./images/telegram.svg"
              width="20"
              height="20"
              style="margin-right: 0.5rem"
              alt="telegram logo"
            />
            Login with Telegram
          </button>
        </div>
      </div>
    </nav>

    <main class="container text-center my-5">
      <div
        id="login-container"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 80vh;
        "
      >
        <h1 class="display-4">Welcome to the Coge Gifts Wheel!</h1>
        <p class="lead">
          Login with your Telegram account to spin the wheel and win points.
        </p>
        <button class="btn btn-warning btn-lg tg-login mt-4" type="button">
          <img
            src="./images/telegram.svg"
            style="margin-right: 0.5rem"
            alt="telegram logo"
          />
          Login with Telegram
        </button>
      </div>

      <div id="user-container" class="d-none">
        <div class="wheel-container">
          <div class="wheel">
            <div class="wheel-slice"><span>10</span></div>
            <div class="wheel-slice"><span>20</span></div>
            <div class="wheel-slice"><span>50</span></div>
            <div class="wheel-slice"><span>100</span></div>
            <div class="wheel-slice"><span>200</span></div>
            <div class="wheel-slice"><span>500</span></div>
            <div class="wheel-slice"><span>1000</span></div>
            <div class="wheel-slice"><span>JACKPOT</span></div>
          </div>
          <div class="wheel-pointer"></div>
          <div class="wheel-center"></div>
        </div>
        <div
          class="d-flex flex-column align-items-center justify-content-center"
        >
          <button
            id="spin-button"
            class="btn btn-lg btn-success mt-4 d-flex align-items-center justify-content-center gap-2"
          >
            <img
              src="./images/spin.svg"
              width="20"
              height="20"
              alt="spin icon"
            />
            Spin the Wheel!
          </button>
          <button
            id="withdraw-button"
            type="button"
            class="btn btn-lg btn-primary mt-4 d-flex align-items-center justify-content-center gap-2"
          >
            <img
              src="./images/withdraw.svg"
              width="20"
              height="20"
              alt="withdraw icon"
            />
            Request Withdrawal
          </button>
        </div>

        <p id="spin-result" class="mt-3 fs-4"></p>

        <div id="withdraw-history" class="mt-5">
          <h3>Withdrawal History</h3>
          <table class="table table-striped table-bordered">
            <thead>
              <tr>
                <th>Date</th>
                <th>Points</th>
                <th>Wallet Address</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="withdraw-requests-body"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div
      class="modal fade"
      id="withdraw-modal"
      tabindex="-1"
      aria-labelledby="withdraw-modal-label"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="withdraw-modal-label">
              Request Withdrawal
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="withdraw-form">
              <div class="mb-3">
                <label for="solana-wallet" class="form-label"
                  >Solana Wallet Address</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="solana-wallet"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="points-amount" class="form-label"
                  >Points to Withdraw</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="points-amount"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary">
                Submit Request
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer mt-auto py-3 bg-dark text-white text-center">
      <div class="container">
        <span>&copy; 2025 Cogecoin. All Rights Reserved.</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
